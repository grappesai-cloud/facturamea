<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — TransportHub</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#0a1929" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      body { display: flex; align-items: center; justify-content: center; background: #f0f4f8; color: #0a1929; padding: 24px; }
      .card { max-width: 480px; text-align: center; background: white; padding: 40px 32px; border-radius: 24px; box-shadow: 0 10px 40px rgba(10, 25, 41, 0.08); }
      .badge { width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, #fbbf24, #f59e0b); display: inline-flex; align-items: center; justify-content: center; font-weight: 700; color: white; font-size: 20px; margin-bottom: 16px; }
      h1 { font-size: 22px; margin: 0 0 8px; }
      p { color: #475569; margin: 0 0 20px; line-height: 1.5; }
      button { background: #0a1929; color: white; border: 0; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 14px; }
      button:hover { background: #142840; }
    </style>
  </head>
  <body>
    <main class="card" role="alert" aria-live="polite">
      <div class="badge" aria-hidden="true">TH</div>
      <h1>Eşti offline</h1>
      <p>Nu am putut încărca pagina. Verifică conexiunea la internet și încearcă din nou.</p>
      <button onclick="location.reload()">Reîncearcă</button>
    </main>
  </body>
</html>
